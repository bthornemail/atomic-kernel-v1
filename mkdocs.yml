      - Who Is This For: guide/who-is-this-for.md
      - What Makes Atomic Kernel Different: guide/what-makes-atomic-kernel-different.md
      - Quick Start: guide/quick-start.md
      - Why Determinism Matters: guide/why-determinism.md
      - Architecture Overview: guide/architecture-overview.md
      - Example Workflow: guide/example-workflow.md
      - Scan / Verify / Render: guide/scan-demo.md
      - Live Demo: demo/scan-verify-render.md
  - Specs:
      - ABI Index: INDEX.md
      - Status Classification: STATUS.md
      - Kernel Change Policy: KERNEL_CHANGE_POLICY.md
      - Roadmap: ROADMAP.md
      - Onboarding Checklist: ONBOARDING_CHECKLIST.md
      - Contributor Discipline: CONTRIBUTOR_DISCIPLINE.md
      - Abstract Syntax Graph Schema (Draft): ABSTRACT_SYNTAX_GRAPH_SCHEMA.md
      - Pattern Instance Schema (Draft): PATTERN_INSTANCE_SCHEMA.md
