      - Diagram View Schema (Draft): DIAGRAM_VIEW_SCHEMA.md
      - Epistemic Assertion Schema (Draft): EPISTEMIC_ASSERTION_SCHEMA.md
      - Topology Edge Schema (Draft): TOPOLOGY_EDGE_SCHEMA.md
      - Ontology Node Schema (Draft): ONTOLOGY_NODE_SCHEMA.md
      - UML Projection Contract (Draft): UML_PROJECTION_CONTRACT.md
